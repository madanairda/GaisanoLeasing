<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gaisano Leasing Contacts</title>

  <!-- Font Awesome -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#efefef;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      min-height:100vh;
    }

    .card{
      width:100%;
      max-width:570px;
      background:#fff;
      min-height:100vh;
      box-shadow:0 0 20px rgba(0,0,0,0.08);
    }

    /* HEADER */
    .header{
      background:#d90000;
      color:#fff;
      text-align:center;
      padding:50px 20px 0;
    }

    .logo{
      width:120px;
      height:120px;
      border-radius:50%;
      background:#fff;
      margin:0 auto 20px;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .logo img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .company-name{
      font-size:38px;
      font-weight:500;
      margin-bottom:40px;
    }

    /* ACTION BUTTONS */
    .actions{
      display:flex;
      border-top:1px solid rgba(255,255,255,0.2);
      margin-top:30px;
    }

    .action-btn{
      flex:1;
      padding:18px 10px;
      color:#fff;
      text-decoration:none;
      border-right:1px solid rgba(255,255,255,0.2);
      transition:0.3s;
    }

    .action-btn:last-child{
      border-right:none;
    }

    .action-btn:hover{
      background:rgba(255,255,255,0.08);
    }

    .action-btn i{
      font-size:22px;
      margin-bottom:8px;
      display:block;
    }

    .action-btn span{
      font-size:13px;
      letter-spacing:1px;
    }

    /* CONTENT */
    .content{
      padding:40px;
    }

    .info{
      display:flex;
      align-items:flex-start;
      gap:20px;
      padding:22px 0;
      border-bottom:1px solid #ddd;
    }

    .info i{
      font-size:28px;
      width:35px;
      margin-top:5px;
    }

    .info h3{
      font-size:22px;
      color:#222;
      margin-bottom:6px;
      font-weight:500;
      line-height:1.5;
    }

    .info p{
      color:#888;
      font-size:16px;
    }

    /* DOWNLOAD BUTTON */
    .download-btn{
      margin-top:40px;
      width:100%;
      border:none;
      background:#ef9a9a;
      color:#fff;
      padding:22px;
      font-size:20px;
      cursor:pointer;
      border-radius:4px;
      box-shadow:0 8px 18px rgba(0,0,0,0.2);
      transition:0.3s;
    }

    .download-btn:hover{
      background:#e57373;
      transform:translateY(-2px);
    }

    .download-btn i{
      margin-right:10px;
    }

    @media(max-width:600px){

      .company-name{
        font-size:28px;
      }

      .content{
        padding:25px;
      }

      .info h3{
        font-size:18px;
      }

      .info p{
        font-size:14px;
      }

      .download-btn{
        font-size:16px;
      }

    }

  </style>
</head>

<body>

<div class="card">

  <!-- HEADER -->
  <div class="header">

    <div class="logo">
      <img src="logo.png" alt="Logo">
    </div>

    <div class="company-name">
      Gaisano Leasing
    </div>

    <!-- TOP ACTION BUTTONS -->
    <div class="actions">

      <a href="https://maps.google.com/?q=Gaisano+Country+Mall,+6000,+Gov.+M.+Cuenco+Ave,+Apas,+Cebu+City,+Cebu"
         target="_blank"
         class="action-btn">

        <i class="fa-solid fa-location-dot"></i>
        <span>MAP</span>
      </a>

      <a href="mailto:leasing@gaisanobrothers.com"
         class="action-btn">

        <i class="fa-solid fa-envelope"></i>
        <span>EMAIL</span>
      </a>

      <a href="tel:09988428565"
         class="action-btn">

        <i class="fa-solid fa-mobile-screen-button"></i>
        <span>CONTACT</span>
      </a>

    </div>

  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- ADDRESS -->
    <div class="info">

      <i class="fa-solid fa-location-dot"
         style="color:#22c55e;"></i>

      <div>

        <h3>
          <a href="https://maps.google.com/?q=Gaisano+Country+Mall,+6000,+Gov.+M.+Cuenco+Ave,+Apas,+Cebu+City,+Cebu"
             target="_blank"
             style="text-decoration:none;color:#222;">

            2F, Admin Office, Gaisano Country Mall,
            Gov. M. Cuenco Ave., Banilad,
            Cebu City 6000

          </a>
        </h3>

        <p>Address</p>

      </div>
    </div>

    <!-- EMAIL -->
    <div class="info">

      <i class="fa-solid fa-envelope"
         style="color:#ef4444;"></i>

      <div>

        <h3>
          leasing@gaisanobrothers.com
        </h3>

        <p>Email</p>

      </div>
    </div>

    <!-- CONTACT -->
    <div class="info">

      <i class="fa-solid fa-mobile-screen-button"
         style="color:#3b82f6;"></i>

      <div>

        <h3>
          0998-842-8565
        </h3>

        <p>Mobile Contact</p>

      </div>
    </div>

    <!-- DOWNLOAD VCARD BUTTON -->
    <button class="download-btn" onclick="downloadVCard()">

      <i class="fa-solid fa-download"></i>
      DOWNLOAD VCARD

    </button>

  </div>

</div>

<script>

function downloadVCard() {

  const vCardData = `
BEGIN:VCARD
VERSION:3.0
FN:Gaisano Leasing
ORG:Gaisano Leasing
TEL;TYPE=CELL:09988428565
EMAIL:leasing@gaisanobrothers.com
ADR:;;2F Admin Office, Gaisano Country Mall, Gov M. Cuenco Ave., Banilad, Cebu City 6000;;;;
END:VCARD
`;

  const blob = new Blob(
    [vCardData],
    { type: 'text/vcard;charset=utf-8' }
  );

  const link = document.createElement('a');

  link.href = URL.createObjectURL(blob);

  link.download = 'Gaisano-Leasing.vcf';

  document.body.appendChild(link);

  link.click();

  document.body.removeChild(link);
}

</script>

</body>
</html>
